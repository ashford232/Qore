name: study
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  image_picker: ^1.2.1
  file_picker: ^11.0.2
  fluentui_system_icons: ^1.1.273
  googleai_dart: ^6.0.0
  flutter_riverpod: ^3.3.1
  skeletonizer: ^2.1.3
  animate_do: ^4.2.0
  path: ^1.9.1
  sqflite: ^2.4.2
  bot_toast: ^4.1.3
  intl: ^0.20.2
  uuid: ^4.5.3
  timeago: ^3.7.1
  google_mlkit_text_recognition: ^0.15.1
  google_mlkit_commons: ^0.11.1
  flutter_staggered_grid_view: ^0.7.0
  open_file: ^3.5.11
  path_provider: ^2.1.5
  share_plus: ^12.0.2
  permission_handler: ^12.0.1
  audio_waveforms: ^2.0.2
  record: ^6.2.0
  just_audio: ^0.10.5
  flutter_image_compress: ^2.4.0
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/qore.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon/qore.png"

flutter_native_splash:
  color: "#ffffff"
  image: assets/icon/splash.png

  android_gravity: center
  android_12:
    color: "#ffffff"
    image: assets/icon/splash.png
flutter:
  uses-material-design: true

  assets:
    - assets/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/inter.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
